name: CI

on:
  push:
    branches: [main, master]
    tags:     ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,toml]"

      - name: Lint with ruff
        run: ruff check crucible_proxy/ tests/

      - name: Type check with mypy
        run: mypy crucible_proxy/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=crucible_proxy --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Publish to PyPI ───────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url:  https://pypi.org/p/crucible-proxychecker

    permissions:
      id-token: write   # OIDC trusted publisher — no API token needed

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
